<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Infinite Yin Yangs</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: black;
    }
    canvas {
      width: 100vw;
      height: 100vh;
      display: block;
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const gl = canvas.getContext("webgl");
if (!gl) {
  alert("WebGL não suportado 😢");
}

// Ajusta resolução
function resize() {
  const dpr = window.devicePixelRatio || 1;
  canvas.width  = innerWidth * dpr;
  canvas.height = innerHeight * dpr;
  gl.viewport(0, 0, canvas.width, canvas.height);
}
window.addEventListener("resize", resize);
resize();

// Vertex shader (quad simples)
const vsSource = `
attribute vec2 aPos;
void main() {
  gl_Position = vec4(aPos, 0.0, 1.0);
}
`;

// Fragment shader (SEU CÓDIGO)
const fsSource = `
precision highp float;

uniform float iTime;
uniform vec3 iResolution;

// Infinte Yin Yangs By Frank Force
#define T iTime
#define R iResolution
#define P(i)vec2(-(step(.5,fract(3.7*sin(i)))-.5)*sin(A(i)),(step(.5,fract(3.7*sin(i)))-.5)*cos(A(i)))
#define A(i)(6.283185*fract(3.7*sin(i))+.7*mix(-1.,1.,fract(3.7*sin(i)))*T)

void mainImage(out vec4 U,in vec2 Z){
  vec2 p=(2.*Z.rg-R.rg)/R.g+.5*vec2(sin(.2*T),sin(.3*T));
  float i=floor(T-length(p)),m=T-i-length(p),z=pow(2.718,-log(3.333)*m)*.08,v=0.;
  p=p*z+P(i);
  for(float r=0.;r<9.;++r)p+=P(i+r+1.)/3.333*pow(.3,r);
  for(float r=0.;r<9.;++r){
    m=-A(i);
    p=vec2(p.r*cos(m)-p.g*sin(m),p.r*sin(m)+p.g*cos(m));
    float b=5.*z/min(R.g,R.r),c=1.,l=length(2.*p+vec2(0,1)),d=l;
    if(p.r<0.)c=mix(c,0.,smoothstep(1.-b,1.+b,l));
    l=length(2.*p-vec2(0,1));
    if(p.r>0.)c=mix(0.,c,smoothstep(1.-b,1.+b,l));
    if(p.g>0.)d=l;
    v=mix(c,v,smoothstep(1.-b,1.,length(p)));
    if(d>.6){
      v=mix(step(0.,p.g),v,smoothstep(.72,.72+b,d));
      if(d<.72+b&&p.g>0.)++i;
      break;
    }
    p.g+=mix(.5,-.5,v=step(0.,p.g));
    z*=2./.6;
    p*=2./.6;
    m=A(i);
    p=vec2(p.r*cos(m)-p.g*sin(m),p.r*sin(m)+p.g*cos(m));
    ++i;
  }
  U=vec4(v*vec3(1.+sin(i+T+i),1.+sin(i+T+1.),1.+sin(i+T+2.)),1.);
}

void main() {
  vec4 color;
  mainImage(color, gl_FragCoord.xy);
  gl_FragColor = color;
}
`;

// Compila shader
function compile(type, source) {
  const s = gl.createShader(type);
  gl.shaderSource(s, source);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(s));
    throw "Erro compilando shader";
  }
  return s;
}

const vs = compile(gl.VERTEX_SHADER, vsSource);
const fs = compile(gl.FRAGMENT_SHADER, fsSource);

// Programa
const program = gl.createProgram();
gl.attachShader(program, vs);
gl.attachShader(program, fs);
gl.linkProgram(program);
gl.useProgram(program);

// Quad fullscreen
const buffer = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([
  -1, -1,
   1, -1,
  -1,  1,
   1,  1,
]), gl.STATIC_DRAW);

const aPos = gl.getAttribLocation(program, "aPos");
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

// Uniforms
const timeLoc = gl.getUniformLocation(program, "iTime");
const resLoc  = gl.getUniformLocation(program, "iResolution");

let start = performance.now();
function render() {
  gl.uniform1f(timeLoc, (performance.now() - start) * 0.001);
  gl.uniform3f(resLoc, canvas.width, canvas.height, 1.0);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(render);
}
render();
</script>
</body>
</html>
